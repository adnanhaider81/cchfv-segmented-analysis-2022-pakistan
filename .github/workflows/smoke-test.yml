name: Smoke test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python requirements
        run: python -m pip install --upgrade pip && python -m pip install -r env/requirements.txt snakemake==7.32.4 pulp==2.7.0
      - name: Run smoke test
        run: make smoke PYTHON=python
      - name: Run Snakemake dry run
        run: make dry
